<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>
    <header class="navbar">

  <div class="logo">
    <div class="logo-icon">H</div>
    <span>HelpHub AI</span>
  </div>

  <nav class="nav-links">
    <a href="./notification.html">Notification</a>
    <a href="./leaderbord.html">Leaderboard</a>
    <a href="./profile.html">Profile</a>
  </nav>

</header>
<section class="profile-section">
<div class="profile-top-card">

  <h2>Muhammad Muzammil</h2>
  <p>Karachi, Pakistan</p>

</div>
  <div class="profile-container">
    

    <!-- LEFT BOX -->
    <div class="profile-left">

      <h6>PUBLIC PROFILE</h6>

      <h2>Skills and Reputation</h2>

      <div class="row-line">
        <span>Trust Score</span>
        <span>100%</span>
      </div>

      <div class="row-line">
        <span>Contribution</span>
        <span>35</span>
      </div>

      <h3>Skills</h3>

      <div class="tags">
        <span>HTML</span>
        <span>CSS</span>
        <span>JavaScript</span>
        <span>React</span>
        <span>Node.js</span>
      </div>

      <h3>Badges</h3>

      <div class="tags">
        <span>Beginner</span>
        <span>Helper</span>
        <span>Contributor</span>
        <span>Top Learner</span>
      </div>

    </div>

    <!-- RIGHT BOX -->
    <div class="profile-right">

      <h6>EDIT PROFILE</h6>

      <h2>Update your identity</h2>

      <form>

        <div class="row">
          <div>
            <label>Name</label>
            <input type="text">
          </div>

          <div>
            <label>Location</label>
            <input type="text">
          </div>
        </div>

        <label>Skills</label>
        <input type="text" placeholder="Enter skills">

        <label>Interests</label>
        <input type="text" placeholder="Enter interests">

        <button type="submit">Save Profile</button>

      </form>

    </div>

  </div>

</section>
</body>
</html>
