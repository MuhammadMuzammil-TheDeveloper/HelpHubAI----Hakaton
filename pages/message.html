<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>
    <header class="navbar">

  <div class="logo">
    <div class="logo-icon">H</div>
    <span>HelpHub AI</span>
  </div>

  <nav class="nav-links">
    <a href="#">Dashboard</a>
    <a href="#">Onboarding</a>
    <a href="#">Messages</a>
  </nav>

</header>
<section class="message-section">

  <div class="message-container">

    <!-- LEFT BOX -->
    <div class="msg-left">

      <h6>CONVERSATION STREAM</h6>

      <h2>Recent Messages</h2>

      <!-- MESSAGE BOX 1 -->
      <div class="msg-card">

        <div class="msg-content">
          <h3>Help Needed in JavaScript</h3>
          <p>I am stuck in array methods can someone help me?</p>
        </div>

        <div class="msg-time">
          09:45 AM
        </div>

      </div>

      <!-- MESSAGE BOX 2 -->
      <div class="msg-card">

        <div class="msg-content">
          <h3>UI Design Feedback</h3>
          <p>Can you review my landing page design?</p>
        </div>

        <div class="msg-time">
          10:15 AM
        </div>

      </div>

    </div>

    <!-- RIGHT BOX -->
    <div class="msg-right">

      <h6>SEND MESSAGE</h6>

      <h2>Start a conversation</h2>

      <form>

        <label>TO</label>
        <input type="text" placeholder="Enter receiver name">

        <label>MESSAGE</label>
        <textarea rows="5" placeholder="Write your message..."></textarea>

        <button type="submit">Send Message</button>

      </form>

    </div>

  </div>

</section>
</body>
</html>
